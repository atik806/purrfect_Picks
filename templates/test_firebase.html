<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Debug Test</title>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; max-height: 300px; }
    </style>
</head>
<body>
    <h1>🔥 Firebase Debug Test</h1>
    
    <div>
        <h2>Firebase Connection Status</h2>
        <div id="status" class="status info">Testing...</div>
    </div>

    <div>
        <h2>Products Data</h2>
        <button onclick="testProducts()">Load Products</button>
        <div id="productStatus" class="status info">Click button to test</div>
        <pre id="productData"></pre>
    </div>

    <div>
        <h2>Console Logs</h2>
        <div id="logs" style="background: #f8f9fa; padding: 10px; border-radius: 4px; min-height: 100px; font-family: monospace; font-size: 12px;"></div>
    </div>

    <script>
        // Capture console logs
        const originalLog = console.log;
        const originalError = console.error;
        const logsDiv = document.getElementById('logs');
        
        function addLog(type, message) {
            const timestamp = new Date().toLocaleTimeString();
            logsDiv.innerHTML += `[${timestamp}] ${type}: ${message}\n`;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
        
        console.log = function(...args) {
            addLog('LOG', args.join(' '));
            originalLog.apply(console, args);
        };
        
        console.error = function(...args) {
            addLog('ERROR', args.join(' '));
            originalError.apply(console, args);
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDSISSs8E8pylb7YUVMSz5PnJXDvM9ivTA",
            authDomain: "catproduct-f6852.firebaseapp.com",
            databaseURL: "https://catproduct-f6852-default-rtdb.firebaseio.com",
            projectId: "catproduct-f6852",
            storageBucket: "catproduct-f6852.firebasestorage.app",
            messagingSenderId: "200540639100",
            appId: "1:200540639100:web:25190faf57c90210329ef9",
            measurementId: "G-83ZTP8EC0H"
        };

        console.log('Initializing Firebase...');
        
        try {
            firebase.initializeApp(firebaseConfig);
            console.log('Firebase initialized successfully');
            document.getElementById('status').className = 'status success';
            document.getElementById('status').textContent = '✅ Firebase initialized successfully!';
            
            // Auto-test products
            setTimeout(testProducts, 1000);
        } catch (error) {
            console.error('Firebase initialization failed:', error);
            document.getElementById('status').className = 'status error';
            document.getElementById('status').textContent = '❌ Firebase initialization failed: ' + error.message;
        }

        function testProducts() {
            console.log('Testing products read...');
            const statusDiv = document.getElementById('productStatus');
            const dataDiv = document.getElementById('productData');
            
            statusDiv.className = 'status info';
            statusDiv.textContent = '⏳ Loading products...';
            
            const db = firebase.database();
            console.log('Database reference created');
            
            db.ref('products').once('value')
                .then(snapshot => {
                    console.log('Products snapshot received');
                    const products = snapshot.val();
                    console.log('Products data:', products);
                    
                    if (products) {
                        const count = Object.keys(products).length;
                        statusDiv.className = 'status success';
                        statusDiv.textContent = `✅ Success! Found ${count} products`;
                        dataDiv.textContent = JSON.stringify(products, null, 2);
                        console.log(`Successfully loaded ${count} products`);
                    } else {
                        statusDiv.className = 'status info';
                        statusDiv.textContent = '⚠️ No products found in database';
                        dataDiv.textContent = 'Database returned null - no products exist';
                        console.log('No products found in database');
                    }
                })
                .catch(error => {
                    console.error('Products read failed:', error);
                    statusDiv.className = 'status error';
                    statusDiv.textContent = '❌ Failed to load products: ' + error.message;
                    dataDiv.textContent = `Error Code: ${error.code}\nError Message: ${error.message}\n\nPossible causes:\n1. Firebase rules blocking read access\n2. Network connectivity issue\n3. Invalid database URL`;
                });
        }

        // Test database connection
        firebase.database().ref('.info/connected').on('value', function(snapshot) {
            if (snapshot.val() === true) {
                console.log('Connected to Firebase');
            } else {
                console.log('Disconnected from Firebase');
            }
        });
    </script>
</body>
</html>
