<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Purrfect Picks</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐱</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF8C94;
            --primary-dark: #ff6b78;
            --accent: #4A90A4;
            --dark: #2D3436;
            --light: #FFFFFF;
            --danger: #e74c3c;
            --success: #27ae60;
            --gray: #636e72;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/static/images/image.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; cursor: pointer; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { text-decoration: none; color: #fff; font-weight: 600; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 380px; gap: 2rem; }
        .checkout-container, .order-summary-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        h1 { color: #fff; margin-bottom: 1.5rem; font-size: 1.8rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        h2 { color: #fff; margin-bottom: 1rem; font-size: 1.2rem; display: flex; align-items: center; gap: 0.5rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; color: #fff; font-weight: 600; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        input, textarea, select {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s;
        }
        input::placeholder, textarea::placeholder { color: rgba(255, 255, 255, 0.6); }
        input:focus, textarea:focus, select:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: rgba(255, 255, 255, 0.15);
        }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        
        .payment-options { display: grid; gap: 0.8rem; }
        .payment-option {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: #fff;
        }
        .payment-option:hover { border-color: var(--primary); background: rgba(255, 140, 148, 0.1); }
        .payment-option.selected { border-color: var(--primary); background: rgba(255, 140, 148, 0.15); }
        .payment-option input { width: auto; }
        
        .summary-items { max-height: 250px; overflow-y: auto; margin-bottom: 1rem; }
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.95rem;
            color: #fff;
        }
        .summary-item:last-child { border-bottom: none; }
        
        .summary-total {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            border-top: 2px solid rgba(255, 255, 255, 0.2);
            margin-top: 0.5rem;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        .btn-primary { 
            background: var(--primary); 
            color: var(--light); 
            margin-top: 1.5rem;
        }
        .btn-primary:hover { 
            background: var(--primary-dark); 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(255, 140, 148, 0.4); 
        }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 1rem 2rem;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 9999;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        
        .empty-cart { text-align: center; padding: 3rem; }
        .empty-cart h2 { color: #fff; }
        
        .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--primary); text-decoration: none; margin-bottom: 1rem; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .order-summary-card { order: -1; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo" onclick="window.location.href='/'">🐱 Purrfect Picks</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/cart">Cart</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="checkout-container">
            <a href="/cart" class="back-link">← Back to Cart</a>
            <h1>📝 Checkout</h1>
            
            <form id="checkoutForm">
                <h2>👤 Shipping Information</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" required placeholder="0130000000">
                </div>
                <div class="form-group">
                    <label>Full Address</label>
                    <textarea id="address" rows="3" required placeholder="Enter your complete address"></textarea>
                </div>
                
                <h2>💳 Payment Method</h2>
                <div class="payment-options">
                    <label class="payment-option selected" onclick="selectPayment(this)">
                        <input type="radio" name="payment" value="cash" checked>
                        <span>💵 Cash on Delivery</span>
                    </label>
                    <label class="payment-option" onclick="selectPayment(this)">
                        <input type="radio" name="payment" value="card">
                        <span>💳 Credit/Debit Card</span>
                    </label>
                    <label class="payment-option" onclick="selectPayment(this)">
                        <input type="radio" name="payment" value="bkash">
                        <span>📱 bKash</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary">Place Order</button>
            </form>
        </div>

        <div class="order-summary-card" id="orderSummary">
            <h2>📦 Order Summary</h2>
            <div class="summary-items" id="summaryItems"></div>
            <div class="summary-total">
                <span>Total</span>
                <span id="summaryTotal">$0.00</span>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDSISSs8E8pylb7YUVMSz5PnJXDvM9ivTA",
            authDomain: "catproduct-f6852.firebaseapp.com",
            databaseURL: "https://catproduct-f6852-default-rtdb.firebaseio.com",
            projectId: "catproduct-f6852",
            storageBucket: "catproduct-f6852.firebasestorage.app",
            messagingSenderId: "200540639100",
            appId: "1:200540639100:web:25190faf57c90210329ef9",
            measurementId: "G-83ZTP8EC0H"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function selectPayment(element) {
            document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            element.querySelector('input').checked = true;
        }

        function loadOrderSummary() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            
            if (cart.length === 0) {
                document.querySelector('.checkout-container').innerHTML = `
                    <div class="empty-cart">
                        <div style="font-size: 4rem; margin-bottom: 1rem;">😿</div>
                        <h2>Your cart is empty</h2>
                        <p style="color: #fff;">Add some products first!</p>
                        <a href="/#products" class="btn btn-primary" style="width: auto; display: inline-block;">Start Shopping</a>
                    </div>`;
                document.getElementById('orderSummary').style.display = 'none';
                return;
            }

            document.getElementById('summaryItems').innerHTML = cart.map(item => `
                <div class="summary-item">
                    <span>${item.icon} ${item.name} ×${item.quantity}</span>
                    <span>$${(item.price * item.quantity).toFixed(2)}</span>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('summaryTotal').textContent = '$' + total.toFixed(2);
        }

        document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.length === 0) {
                showToast('Your cart is empty!', 'error');
                return;
            }

            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
            
            const order = {
                items: cart,
                customer: {
                    name: document.getElementById('fullName').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value
                },
                paymentMethod: paymentMethod,
                total: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0),
                status: 'pending',
                createdAt: new Date().toISOString()
            };

            try {
                await db.ref('orders').push(order);
                localStorage.removeItem('cart');
                showToast('🎉 Order placed successfully!', 'success');
                setTimeout(() => window.location.href = '/', 2000);
            } catch (error) {
                showToast('Error placing order', 'error');
            }
        });

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        loadOrderSummary();
    </script>
</body>
</html>
