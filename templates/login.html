<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Purrfect Picks</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF8C94;
            --primary-dark: #ff6b78;
            --accent: #4A90A4;
            --dark: #2D3436;
            --light: #FFFFFF;
            --danger: #e74c3c;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/static/images/image.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .login-card h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .login-card .subtitle {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .form-group { margin-bottom: 1.2rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; color: #fff; font-weight: 600; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.6); }
        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: rgba(255, 255, 255, 0.15);
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            width: 100%;
        }
        .btn-primary { 
            background: var(--primary); 
            color: var(--light); 
        }
        .btn-primary:hover { 
            background: var(--primary-dark); 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(255, 140, 148, 0.4); 
        }
        .error { color: var(--danger); margin-top: 1rem; display: none; font-size: 0.9rem; }
        .back-link { 
            margin-top: 1.5rem; 
            color: var(--primary); 
            text-decoration: none; 
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🐱 Admin Login</h1>
        <p class="subtitle">Purrfect Picks Admin Panel</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="admin@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
            <p class="error" id="errorMsg"></p>
        </form>
        
        <a href="/" class="back-link">← Back to Website</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDSISSs8E8pylb7YUVMSz5PnJXDvM9ivTA",
            authDomain: "catproduct-f6852.firebaseapp.com",
            databaseURL: "https://catproduct-f6852-default-rtdb.firebaseio.com",
            projectId: "catproduct-f6852",
            storageBucket: "catproduct-f6852.firebasestorage.app",
            messagingSenderId: "200540639100",
            appId: "1:200540639100:web:25190faf57c90210329ef9",
            measurementId: "G-83ZTP8EC0H"
        };

        firebase.initializeApp(firebaseConfig);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                sessionStorage.setItem('adminUser', JSON.stringify({
                    uid: user.uid,
                    email: user.email
                }));
                window.location.href = '/admin';
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
